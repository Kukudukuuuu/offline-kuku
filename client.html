<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUKU Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0a;
  --surface:   #111111;
  --border:    #1e1e1e;
  --border2:   #2a2a2a;
  --text:      rgba(255,255,255,0.82);
  --dim:       rgba(255,255,255,0.32);
  --accent:    #7fdbca;
  --warn:      #ff7eb6;
  --ok:        #b8cc52;
  --system:    rgba(255,255,255,0.26);
  --input-bg:  #0d0d0d;
  --font:      'IBM Plex Mono', monospace;
  --r:         3px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; overflow: hidden; }

/* ── SETUP ─────────────────────────────────────────────────────────── */
#setup {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.setup-box {
  width: min(440px, 92vw);
  border: 1px solid var(--border2);
  padding: 36px 32px 28px;
  background: var(--surface);
}
.setup-box h1 {
  font-size: 17px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 3px;
}
.setup-box .sub { color: var(--dim); font-size: 11px; margin-bottom: 28px; }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 5px;
}
.field input {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--border2); color: var(--text);
  font-family: var(--font); font-size: 13px;
  padding: 9px 12px; outline: none; border-radius: var(--r);
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--dim); }
.hint { font-size: 10px; color: var(--dim); margin-top: 4px; }

.btn {
  width: 100%; margin-top: 6px; padding: 11px;
  background: var(--accent); color: #000;
  border: none; font-family: var(--font);
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; border-radius: var(--r); transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: default; }

#setup-error {
  font-size: 11px; color: var(--warn); margin-top: 10px; min-height: 16px;
}

/* ── TOAST ─────────────────────────────────────────────────────────── */
#toast {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-size: 11px;
  padding: 7px 14px; border-radius: 20px;
  z-index: 200; pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.err  { border-color: var(--warn); color: var(--warn); }
#toast.ok   { border-color: var(--ok);   color: var(--ok);   }

/* ── APP LAYOUT ─────────────────────────────────────────────────────── */
#app {
  height: 100vh;
  display: none;
  grid-template-columns: 1fr 180px;
  grid-template-rows: 42px 1fr auto 48px;
  grid-template-areas:
    "header  sidebar"
    "msgs    sidebar"
    "typing  sidebar"
    "input   sidebar";
}
#app.active { display: grid; }

/* header */
#header {
  grid-area: header;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 9px;
}
#conn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
  transition: background 0.3s;
}
#conn-dot.reconnecting { background: #f9a875; animation: blink 0.8s step-end infinite; }
#conn-dot.offline      { background: var(--warn); animation: none; }
@keyframes blink { 50% { opacity: 0; } }

#conn-label {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--dim); transition: color 0.3s;
}
#conn-label.reconnecting { color: #f9a875; }
#conn-label.offline      { color: var(--warn); }

#header-right {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
}
#header-addr { font-size: 10px; color: var(--dim); opacity: 0.5; }
#mute-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--dim); font-family: var(--font); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 7px; cursor: pointer; border-radius: var(--r);
  transition: border-color 0.15s, color 0.15s;
}
#mute-btn:hover { border-color: var(--dim); color: var(--text); }
#mute-btn.muted { border-color: var(--warn); color: var(--warn); }

/* messages */
#msgs {
  grid-area: msgs;
  overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 0;
  scroll-behavior: smooth; position: relative;
}
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* message groups */
.msg-group { margin-bottom: 10px; animation: fadein 0.15s ease; }
.msg-group-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.msg-user   { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
.msg-time   { font-size: 10px; color: var(--dim); }
.msg-bubble { font-size: 13px; color: var(--text); padding-left: 1px; word-break: break-word; white-space: pre-wrap; line-height: 1.55; }
.msg-bubble + .msg-bubble { margin-top: 1px; }

/* continued messages (same sender, grouped) */
.msg-cont { animation: fadein 0.12s ease; }
.msg-cont .msg-bubble { padding-left: 1px; }

/* system */
.msg-system { font-size: 10px; color: var(--system); font-style: italic; padding: 5px 0 3px; letter-spacing: 0.03em; }
.msg-system::before { content: "—  "; }

/* error / server notice */
.msg-error { font-size: 11px; color: var(--warn); padding: 4px 0; }
.msg-error::before { content: "✕  "; }

/* history divider */
.history-divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--dim); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; margin: 6px 0 10px;
}
.history-divider::before, .history-divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border);
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: none; }
}

/* scroll-to-bottom button */
#scroll-btn {
  position: absolute; bottom: 12px; right: 20px;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--dim); font-family: var(--font); font-size: 11px;
  padding: 5px 10px; cursor: pointer; border-radius: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#scroll-btn.visible { opacity: 1; pointer-events: all; }
#scroll-btn:hover { color: var(--text); border-color: var(--dim); }

/* typing indicator */
#typing-bar {
  grid-area: typing;
  min-height: 18px;
  padding: 2px 16px;
  font-size: 10px; color: var(--dim); font-style: italic;
  letter-spacing: 0.03em;
}

/* sidebar */
#sidebar {
  grid-area: sidebar;
  border-left: 1px solid var(--border);
  padding: 14px 12px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 0;
}
.sidebar-label {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 8px;
}
#user-list { display: flex; flex-direction: column; gap: 1px; }
.user-item {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 0; font-size: 11px; color: var(--text);
  animation: fadein 0.2s ease;
}
.user-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-name.me { opacity: 0.55; }

.sidebar-section { margin-top: 18px; }
.cmd-list { font-size: 10px; color: var(--dim); line-height: 2; }
.cmd-list code { color: var(--accent); font-size: 10px; }

#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); }

/* input */
#input-area {
  grid-area: input;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 9px;
}
#input-area .prompt { color: var(--accent); font-size: 13px; user-select: none; flex-shrink: 0; }
#msg-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 13px; color: var(--text);
  caret-color: var(--accent);
}
#msg-input::placeholder { color: var(--dim); }
#msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

#send-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--dim); font-family: var(--font); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 10px; cursor: pointer; border-radius: var(--r);
  transition: border-color 0.15s, color 0.15s;
}
#send-btn:hover { border-color: var(--accent); color: var(--accent); }
#send-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <h1>KUKU Chat</h1>
    <p class="sub">no internet — local network only</p>

    <div class="field">
      <label>Server address</label>
      <input id="srv-input" type="text" placeholder="ws://192.168.1.x:4242" autocomplete="off" spellcheck="false">
      <p class="hint">The host's local IP + port. Default port: 4242.</p>
    </div>

    <div class="field">
      <label>Your name</label>
      <input id="name-input" type="text" placeholder="anon" maxlength="24" autocomplete="off" spellcheck="false">
    </div>

    <button class="btn" id="connect-btn">Connect</button>
    <div id="setup-error"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div id="app">
  <div id="header">
    <span id="conn-dot"></span>
    <span id="conn-label">online</span>
    <div id="header-right">
      <button id="mute-btn" title="Toggle sound">sound on</button>
      <span id="header-addr"></span>
    </div>
  </div>

  <div id="msgs">
    <button id="scroll-btn">↓ new messages</button>
  </div>

  <div id="typing-bar"></div>

  <div id="sidebar">
    <div class="sidebar-label">Online</div>
    <div id="user-list"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Commands</div>
      <div class="cmd-list">
        <code>/nick &lt;name&gt;</code><br>rename<br>
        <code>/clear</code><br>clear chat
      </div>
    </div>
  </div>

  <div id="input-area">
    <span class="prompt">›</span>
    <input id="msg-input" type="text" placeholder="type a message…" maxlength="2000" autocomplete="off" spellcheck="false" disabled>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
// ── state ─────────────────────────────────────────────────────────────────────
let ws            = null;
let myUsername    = "";
let myColor       = "";
let serverAddr    = "";
let connected     = false;
let muted         = false;
let unread        = 0;
let reconnectAttempts = 0;
let reconnectTimer    = null;
let intentionalClose  = false;
let typingTimer       = null;
let lastSender        = null;   // for message grouping
let lastGroupEl       = null;

const MAX_RECONNECT_DELAY = 16_000;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── DOM refs ──────────────────────────────────────────────────────────────────
const setupEl    = document.getElementById("setup");
const appEl      = document.getElementById("app");
const msgsEl     = document.getElementById("msgs");
const userListEl = document.getElementById("user-list");
const msgInput   = document.getElementById("msg-input");
const sendBtn    = document.getElementById("send-btn");
const setupErr   = document.getElementById("setup-error");
const srvInput   = document.getElementById("srv-input");
const nameInput  = document.getElementById("name-input");
const connDot    = document.getElementById("conn-dot");
const connLabel  = document.getElementById("conn-label");
const headerAddr = document.getElementById("header-addr");
const muteBtn    = document.getElementById("mute-btn");
const typingBar  = document.getElementById("typing-bar");
const scrollBtn  = document.getElementById("scroll-btn");
const toastEl    = document.getElementById("toast");
const connectBtn = document.getElementById("connect-btn");

// restore last server addr
const saved = sessionStorage.getItem("kuku-chat-srv");
if (saved) srvInput.value = saved;

// ── setup listeners ───────────────────────────────────────────────────────────
connectBtn.addEventListener("click", initConnect);
srvInput.addEventListener("keydown",  e => e.key === "Enter" && initConnect());
nameInput.addEventListener("keydown", e => e.key === "Enter" && initConnect());

function initConnect() {
  setupErr.textContent = "";
  let addr = srvInput.value.trim();
  const name = nameInput.value.trim() || "anon";

  if (!addr) { setupErr.textContent = "Enter a server address."; return; }
  if (!/^wss?:\/\//.test(addr)) { addr = "ws://" + addr; srvInput.value = addr; }

  // basic URL validation
  try { new URL(addr); } catch { setupErr.textContent = "That doesn't look like a valid address."; return; }

  serverAddr  = addr;
  myUsername  = name;
  intentionalClose = false;
  reconnectAttempts = 0;

  sessionStorage.setItem("kuku-chat-srv", addr);
  headerAddr.textContent = addr;

  connectBtn.disabled = true;
  connectBtn.textContent = "Connecting…";
  setupErr.textContent = "";

  connect();
}

// ── connection ────────────────────────────────────────────────────────────────
function connect() {
  clearTimeout(reconnectTimer);

  try { ws = new WebSocket(serverAddr); }
  catch(e) { handleConnectError(`Invalid address: ${e.message}`); return; }

  // connection timeout (5s to get welcome)
  let welcomeTimer = setTimeout(() => {
    if (!connected) {
      ws.close();
      handleConnectError("Timed out. Is the server running?");
    }
  }, 5000);

  ws.addEventListener("open", () => {
    ws.send(JSON.stringify({ type: "join", username: myUsername }));
    // welcome will confirm connection
  });

  ws.addEventListener("message", (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === "welcome") {
      clearTimeout(welcomeTimer);
      onConnected(msg);
      return;
    }
    handleMsg(msg);
  });

  ws.addEventListener("error", () => {
    clearTimeout(welcomeTimer);
    if (!connected) {
      handleConnectError("Couldn't reach the server. Check the address and make sure the server is running.");
    }
  });

  ws.addEventListener("close", (e) => {
    clearTimeout(welcomeTimer);
    if (!connected) return; // initial connect failure handled above
    connected = false;
    setConnState("reconnecting");
    addSystem("Connection lost.");
    setInputEnabled(false);
    lastSender = null;

    if (!intentionalClose) scheduleReconnect();
  });
}

function handleConnectError(msg) {
  connectBtn.disabled = false;
  connectBtn.textContent = "Connect";
  setupErr.textContent = msg;
}

function onConnected(msg) {
  myColor    = msg.color;
  myUsername = msg.username; // server may have deduped it

  connected = true;
  reconnectAttempts = 0;

  // first connect: show app
  if (!appEl.classList.contains("active")) {
    setupEl.style.display = "none";
    appEl.classList.add("active");
  }

  setConnState("online");
  setInputEnabled(true);
  msgInput.focus();

  // render history
  if (msg.history && msg.history.length) {
    const div = document.createElement("div");
    div.className = "history-divider";
    div.textContent = `last ${msg.history.length} messages`;
    msgsEl.insertBefore(div, scrollBtn);

    for (const h of msg.history) addMessage(h, true);
    addSystem(`reconnected as ${myUsername}`);
  } else {
    addSystem(`connected as ${myUsername}`);
  }

  scrollBottom();
}

function scheduleReconnect() {
  const delay = Math.min(1000 * Math.pow(1.8, reconnectAttempts), MAX_RECONNECT_DELAY);
  reconnectAttempts++;
  const secs = Math.round(delay / 1000);
  connLabel.textContent = `reconnecting in ${secs}s…`;

  reconnectTimer = setTimeout(() => {
    connLabel.textContent = "reconnecting…";
    connect();
  }, delay);
}

// ── message handling ──────────────────────────────────────────────────────────
function handleMsg(msg) {
  if (msg.type === "system")  { addSystem(msg.text); return; }
  if (msg.type === "message") { addMessage(msg); return; }
  if (msg.type === "userlist"){ renderUserList(msg.users); return; }
  if (msg.type === "typing")  { renderTyping(msg.users); return; }
  if (msg.type === "error")   { addError(msg.text); return; }
  if (msg.type === "nick_ok") {
    myUsername = msg.username;
    myColor    = msg.color;
    toast(`You're now "${myUsername}"`, "ok");
    return;
  }
}

function addMessage({ username, color, text, ts }, isHistory = false) {
  const isMine = username === myUsername;
  const time = new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  // message grouping: same sender back-to-back
  if (lastSender === username && lastGroupEl && !isHistory) {
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble msg-cont";
    bubble.textContent = text;
    lastGroupEl.appendChild(bubble);
  } else {
    const group = document.createElement("div");
    group.className = "msg-group";
    group.innerHTML = `
      <div class="msg-group-meta">
        <span class="msg-user" style="color:${color}">${esc(username)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-bubble">${esc(text)}</div>`;
    msgsEl.insertBefore(group, scrollBtn);
    lastGroupEl = group;
    lastSender  = username;
  }

  // notification for incoming messages when tab is hidden
  if (!isMine && !isHistory) {
    playBeep();
    if (document.hidden) {
      unread++;
      document.title = `(${unread}) KUKU Chat`;
    }
  }

  if (!isScrolledUp()) scrollBottom();
}

function addSystem(text) {
  lastSender = null; lastGroupEl = null;
  const el = document.createElement("div");
  el.className = "msg-system";
  el.textContent = text;
  msgsEl.insertBefore(el, scrollBtn);
  if (!isScrolledUp()) scrollBottom();
}

function addError(text) {
  toast(text, "err");
}

function renderUserList(users) {
  userListEl.innerHTML = "";
  for (const u of users) {
    const item = document.createElement("div");
    item.className = "user-item";
    item.innerHTML = `
      <span class="user-dot" style="background:${u.color}"></span>
      <span class="user-name${u.username === myUsername ? " me" : ""}">${esc(u.username)}</span>`;
    userListEl.appendChild(item);
  }
}

function renderTyping(users) {
  const others = users.filter(u => u !== myUsername);
  if (!others.length) { typingBar.textContent = ""; return; }
  if (others.length === 1) typingBar.textContent = `${others[0]} is typing…`;
  else if (others.length === 2) typingBar.textContent = `${others[0]} and ${others[1]} are typing…`;
  else typingBar.textContent = "several people are typing…";
}

// ── commands ──────────────────────────────────────────────────────────────────
function handleCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();

  if (cmd === "/clear") {
    // keep only the scroll button
    [...msgsEl.children].forEach(el => { if (el.id !== "scroll-btn") el.remove(); });
    lastSender = null; lastGroupEl = null;
    return true;
  }

  if (cmd === "/nick" && parts[1]) {
    ws.send(JSON.stringify({ type: "nick", username: parts.slice(1).join("_") }));
    return true;
  }

  if (cmd === "/nick") { toast("Usage: /nick <newname>", "err"); return true; }

  toast(`Unknown command: ${cmd}`, "err");
  return true;
}

// ── send ──────────────────────────────────────────────────────────────────────
function sendMsg() {
  const text = msgInput.value;
  const trimmed = text.trim();
  if (!trimmed || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (trimmed.startsWith("/")) {
    msgInput.value = "";
    handleCommand(trimmed);
    return;
  }

  ws.send(JSON.stringify({ type: "message", text: trimmed }));
  msgInput.value = "";
  clearTimeout(typingTimer);
}

sendBtn.addEventListener("click", sendMsg);
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// typing signal
msgInput.addEventListener("input", () => {
  if (!ws || ws.readyState !== WebSocket.OPEN || !connected) return;
  ws.send(JSON.stringify({ type: "typing" }));
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {}, 3000);
});

// ── scroll ────────────────────────────────────────────────────────────────────
function isScrolledUp() {
  return msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight > 60;
}

function scrollBottom() {
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

msgsEl.addEventListener("scroll", () => {
  if (isScrolledUp()) {
    scrollBtn.classList.add("visible");
  } else {
    scrollBtn.classList.remove("visible");
    unread = 0;
    if (!document.hidden) document.title = "KUKU Chat";
  }
});

scrollBtn.addEventListener("click", () => {
  scrollBottom();
  scrollBtn.classList.remove("visible");
  unread = 0;
  document.title = "KUKU Chat";
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) { unread = 0; document.title = "KUKU Chat"; }
});

// ── connection state UI ───────────────────────────────────────────────────────
function setConnState(state) {
  connDot.className   = state === "online" ? "" : state;
  connLabel.className = state === "online" ? "" : state;
  connLabel.textContent = state === "online" ? "online" : state === "reconnecting" ? "reconnecting…" : "offline";
}

function setInputEnabled(on) {
  msgInput.disabled = !on;
  sendBtn.disabled  = !on;
  if (on) msgInput.focus();
}

// ── sound ─────────────────────────────────────────────────────────────────────
function playBeep() {
  if (muted) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value  = 880;
    osc.type             = "sine";
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  } catch {}
}

muteBtn.addEventListener("click", () => {
  muted = !muted;
  muteBtn.textContent = muted ? "sound off" : "sound on";
  muteBtn.classList.toggle("muted", muted);
  // resume AudioContext on user gesture
  if (!muted && audioCtx.state === "suspended") audioCtx.resume();
});

// ── toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(text, type = "") {
  toastEl.textContent = text;
  toastEl.className = "show" + (type ? " " + type : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.className = ""; }, 3000);
}

// ── utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
